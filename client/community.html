<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>공유 일기 커뮤니티</title>
  <style>
    body {
      font-family: 'Pretendard', sans-serif;
      background-color: #f8f9fa;
      padding: 2rem;
      padding-bottom: 80px;
      max-width: 900px;
      margin: auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .search-bar input {
      width: 100%;
      padding: 0.7rem;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin-bottom: 1rem;
      font-size: 1rem;
    }

    .filter-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
      margin-bottom: 1.5rem;
    }

    .filter-buttons button {
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 6px;
      background-color: #dee2e6;
      cursor: pointer;
      font-size: 0.95rem;
    }

    .filter-buttons button.active {
      background-color: #339af0;
      color: white;
    }

    .diary-card {
      background-color: white;
      border: 1px solid #ced4da;
      border-radius: 10px;
      padding: 1.2rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }

    .emotion-tag {
      font-weight: bold;
      color: #495057;
      margin-bottom: 0.5rem;
    }

    .diary-card p {
      margin: 0.4rem 0;
    }

    .music-btn {
      display: inline-block;
      background: #74c0fc;
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      color: white;
      text-decoration: none;
      font-size: 0.9rem;
      margin-top: 0.5rem;
    }

    .music-btn:hover {
      background: #339af0;
    }

    .action-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 1rem;
      font-size: 0.95rem;
    }

    .like-btn, .subscribe-btn {
      border: none;
      border-radius: 6px;
      padding: 0.3rem 0.7rem;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .like-btn {
      background: #ffa8a8;
      color: white;
    }

    .subscribe-btn {
      background: #ffd43b;
    }

    .subscribe-btn[disabled] {
      background: #fab005;
      color: #444;
    }
  </style>
</head>
<body>
  <h1>🌍 익명 일기 커뮤니티</h1>

  <div class="search-bar">
    <input type="text" id="search-input" placeholder="키워드로 공유 일기 검색...">
  </div>

  <div class="filter-buttons">
    <button data-emotion="all" class="active">전체</button>
    <button data-emotion="happy">😊 행복</button>
    <button data-emotion="sad">😢 슬픔</button>
    <button data-emotion="angry">😠 분노</button>
    <button data-emotion="anxious">😟 불안</button>
    <button data-emotion="neutral">😐 보통</button>
  </div>

  <div id="diary-list">불러오는 중...</div>

  <script type="module">
    import { supabase } from './js/supabase.js';
    import { checkAuth } from './js/auth.js';
    import { insertBottomNav } from './js/components/nav.js';

    checkAuth();
    insertBottomNav();

    const diaryList = document.getElementById('diary-list');
    const buttons = document.querySelectorAll('.filter-buttons button');
    const searchInput = document.getElementById('search-input');

    let sharedDiaries = [];
    let currentUserId = null;
    let currentSubscriptions = [];

    async function loadSharedDiaries() {
      const { data: { user } } = await supabase.auth.getUser();
      currentUserId = user.id;

      const { data: subs } = await supabase
        .from('subscriptions')
        .select('following_id')
        .eq('follower_id', currentUserId);

      currentSubscriptions = subs.map(s => s.following_id);

      const { data, error } = await supabase
        .from('shared_diaries')
        .select('*')
        .order('created_at', { ascending: false });

      sharedDiaries = data;
      renderDiaries('all', '');
    }

    function renderDiaries(filter, keyword = '') {
      diaryList.innerHTML = '';

      const filtered = sharedDiaries.filter(d => {
        const matchEmotion = filter === 'all' || d.emotion === filter;
        const matchKeyword = d.content.toLowerCase().includes(keyword.toLowerCase()) || (d.feedback || '').toLowerCase().includes(keyword.toLowerCase());
        return matchEmotion && matchKeyword;
      });

      if (filtered.length === 0) {
        diaryList.innerHTML = '<p>검색 결과가 없습니다.</p>';
        return;
      }

      filtered.forEach(entry => {
        const card = document.createElement('div');
        card.className = 'diary-card';

        const anonId = `anon-${entry.user_id.slice(0, 4)}`;
        const isSubscribed = currentSubscriptions.includes(entry.user_id);
        const isMine = entry.user_id === currentUserId;

        card.innerHTML = `
          <div class="emotion-tag">감정: ${entry.emotion}</div>
          <p>${entry.content}</p>
          <p><strong>GPT 피드백:</strong> ${entry.feedback}</p>
          <a href="${entry.music}" class="music-btn" target="_blank">🎵 음악 듣기</a>
          <div class="action-row">
            <div>익명 유저: <strong>${anonId}</strong></div>
            <div>
              ❤️ <span id="likes-${entry.id}">${entry.likes}</span>
              <button class="like-btn" data-id="${entry.id}">공감</button>
              ${!isMine ? `<button class="subscribe-btn" data-uid="${entry.user_id}" ${isSubscribed ? 'disabled' : ''}>
                ${isSubscribed ? '✔ 구독 중' : '구독하기'}
              </button>` : ''}
            </div>
          </div>
        `;

        diaryList.appendChild(card);
      });

      attachLikeHandlers();
      attachSubscribeHandlers();
    }

    function attachLikeHandlers() {
      diaryList.querySelectorAll('.like-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = btn.dataset.id;
          btn.disabled = true;

          const countEl = document.getElementById(`likes-${id}`);
          const currentLikes = parseInt(countEl.textContent);

          const { error } = await supabase
            .from('shared_diaries')
            .update({ likes: currentLikes + 1 })
            .eq('id', id);

          if (!error) countEl.textContent = currentLikes + 1;
        });
      });
    }

    function attachSubscribeHandlers() {
      diaryList.querySelectorAll('.subscribe-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const uid = btn.dataset.uid;

          const { error } = await supabase
            .from('subscriptions')
            .insert({ follower_id: currentUserId, following_id: uid });

          if (!error) {
            btn.textContent = '✔ 구독 중';
            btn.disabled = true;
          }
        });
      });
    }

    // 필터 버튼 이벤트
    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        buttons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const emotion = btn.dataset.emotion;
        const keyword = searchInput.value.trim();
        renderDiaries(emotion, keyword);
      });
    });

    // 검색창 입력 시 필터링
    searchInput.addEventListener('input', () => {
      const keyword = searchInput.value.trim();
      const activeBtn = document.querySelector('.filter-buttons .active');
      const emotion = activeBtn.dataset.emotion;
      renderDiaries(emotion, keyword);
    });

    loadSharedDiaries();
  </script>
</body>
</html>
