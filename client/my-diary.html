<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>내 감정 일기</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      padding: 2rem;
      max-width: 700px;
      margin: auto;
      background-color: #f8f9fa;
      padding-bottom: 80px; /* 하단 네비 */
    }

    h1 {
      text-align: center;
      margin-bottom: 1rem;
    }

    .filter-bar {
      display: flex;
      justify-content: center;
      margin-bottom: 1.5rem;
    }

    .filter-bar select {
      padding: 0.5rem;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 1rem;
    }

    .diary-card {
      background: white;
      border-left: 8px solid #ccc;
      border-radius: 10px;
      padding: 1rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
      position: relative;
    }

    .diary-card h3 {
      margin: 0 0 0.3rem;
    }

    .diary-card .date {
      font-size: 0.9rem;
      color: #777;
      margin-bottom: 0.5rem;
    }

    .diary-card button {
      background-color: #22b8cf;
      color: white;
      border: none;
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      cursor: pointer;
    }

    .diary-card .delete-btn {
      position: absolute;
      top: 0.7rem;
      right: 0.7rem;
      background: #ffa8a8;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 0.8rem;
      padding: 0.3rem 0.6rem;
      cursor: pointer;
    }

    .color-happy { border-color: #ffd43b; }
    .color-sad { border-color: #74c0fc; }
    .color-angry { border-color: #fa5252; }
    .color-anxious { border-color: #868e96; }
    .color-neutral { border-color: #ced4da; }
  </style>
</head>
<body>
  <h1>📘 내 감정 일기</h1>

  <div class="filter-bar">
    <label for="emotion-filter" style="margin-right: 0.5rem;">감정 필터:</label>
    <select id="emotion-filter">
      <option value="all">전체</option>
      <option value="happy">😊 행복</option>
      <option value="sad">😢 슬픔</option>
      <option value="angry">😠 분노</option>
      <option value="anxious">😟 불안</option>
      <option value="neutral">😐 보통</option>
    </select>
  </div>

  <div id="diary-list">불러오는 중...</div>

  <script type="module">
    import { supabase } from './js/supabase.js';
    import { checkAuth } from './js/auth.js';
    import { insertBottomNav } from './js/components/nav.js';

    checkAuth();
    insertBottomNav();

    const diaryList = document.getElementById('diary-list');
    const emotionFilter = document.getElementById('emotion-filter');

    const emotionMap = {
      happy: '행복',
      sad: '슬픔',
      angry: '분노',
      anxious: '불안',
      neutral: '보통'
    };

    const colorClassMap = {
      happy: 'color-happy',
      sad: 'color-sad',
      angry: 'color-angry',
      anxious: 'color-anxious',
      neutral: 'color-neutral'
    };

    let diaries = [];

    async function fetchDiaries() {
      const { data: { user } } = await supabase.auth.getUser();

      const { data, error } = await supabase
        .from('diaries')
        .select('*')
        .eq('user_id', user.id)
        .order('created_at', { ascending: false });

      if (error) {
        diaryList.innerHTML = `<p>❌ 일기 불러오기 실패: ${error.message}</p>`;
        return;
      }

      diaries = data;
      renderDiaries();
    }

    function renderDiaries() {
      const selected = emotionFilter.value;
      const filtered = selected === 'all' ? diaries : diaries.filter(d => d.emotion === selected);

      diaryList.innerHTML = '';

      if (filtered.length === 0) {
        diaryList.innerHTML = '<p>작성된 일기가 없습니다.</p>';
        return;
      }

      filtered.forEach(diary => {
        const card = document.createElement('div');
        card.className = `diary-card ${colorClassMap[diary.emotion] || ''}`;

        const date = new Date(diary.created_at).toLocaleDateString();
        const emotionText = emotionMap[diary.emotion] || diary.emotion;

        card.innerHTML = `
          <button class="delete-btn" data-id="${diary.id}">삭제</button>
          <h3>${emotionText} 일기</h3>
          <div class="date">${date}</div>
          <p>${diary.content}</p>
          <button onclick="location.href='diary-detail.html?id=${diary.id}'">📖 상세 보기</button>
        `;

        diaryList.appendChild(card);
      });

      document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = btn.dataset.id;
          if (!confirm('정말 삭제하시겠습니까?')) return;

          const { error } = await supabase.from('diaries').delete().eq('id', id);
          if (!error) {
            diaries = diaries.filter(d => d.id !== id);
            renderDiaries();
          } else {
            alert('삭제 실패');
          }
        });
      });
    }

    emotionFilter.addEventListener('change', renderDiaries);

    fetchDiaries();
  </script>
</body>
</html>
