<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>내 감정 일기</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      padding: 2rem;
      max-width: 700px;
      margin: auto;
      background-color: #f8f9fa;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .logout-btn {
      background-color: #ff6b6b;
      border: none;
      color: white;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      cursor: pointer;
    }

    .filter-bar {
      display: flex;
      align-items: center;
      margin-bottom: 2rem;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .filter-bar label {
      font-weight: bold;
      font-size: 1rem;
      white-space: nowrap;
    }

    .filter-bar select {
      padding: 0.4rem 0.6rem;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    .diary-card {
      background-color: white;
      border-left: 6px solid #228be6;
      padding: 1rem;
      border-radius: 10px;
      margin-bottom: 1rem;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }

    .diary-card h3 {
      margin: 0 0 0.5rem 0;
    }

    .diary-card .date {
      font-size: 0.9rem;
      color: #888;
    }

    .diary-card button {
      margin-top: 0.7rem;
      padding: 0.5rem 1rem;
      font-size: 0.9rem;
      background-color: #339af0;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .color-happy { border-left-color: #ffd43b; }
    .color-sad { border-left-color: #74c0fc; }
    .color-angry { border-left-color: #fa5252; }
    .color-anxious { border-left-color: #868e96; }
    .color-neutral { border-left-color: #ced4da; }
  </style>
</head>
<body>
  <header>
    <h1>📘 내 감정 일기</h1>
    <button class="logout-btn" id="logout-btn">로그아웃</button>
  </header>

  <div class="filter-bar">
    <label for="emotion-filter">감정 필터</label>
    <select id="emotion-filter">
      <option value="all">전체</option>
      <option value="happy">😊 행복</option>
      <option value="sad">😢 슬픔</option>
      <option value="angry">😠 분노</option>
      <option value="anxious">😟 불안</option>
      <option value="neutral">😐 보통</option>
    </select>
  </div>

  <div id="diary-list"></div>

  <script type="module">
    import { supabase } from './js/supabase.js';
    import { insertBottomNav } from './js/components/nav.js';
    import { checkAuth } from './js/auth.js';

    checkAuth();
    insertBottomNav();

    const diaryList = document.getElementById('diary-list');
    const emotionFilter = document.getElementById('emotion-filter');
    const logoutBtn = document.getElementById('logout-btn');

    const emotionMap = {
      happy: '😊 행복',
      sad: '😢 슬픔',
      angry: '😠 분노',
      anxious: '😟 불안',
      neutral: '😐 보통'
    };

    const colorClassMap = {
      happy: 'color-happy',
      sad: 'color-sad',
      angry: 'color-angry',
      anxious: 'color-anxious',
      neutral: 'color-neutral'
    };

    let diaries = [];

    async function fetchDiaries() {
      const { data: { user } } = await supabase.auth.getUser();
      const { data, error } = await supabase
        .from('diaries')
        .select('id, content, emotion, created_at')
        .eq('user_id', user.id)
        .order('created_at', { ascending: false });

      if (error) {
        alert('일기 불러오기 실패: ' + error.message);
        return;
      }

      diaries = data;
      renderDiaries();
    }

    function renderDiaries() {
      const selected = emotionFilter.value;
      const filtered = selected === 'all'
        ? diaries
        : diaries.filter(d => d.emotion === selected);

      diaryList.innerHTML = '';

      if (filtered.length === 0) {
        diaryList.innerHTML = '<p>일기가 없습니다.</p>';
        return;
      }

      filtered.forEach(diary => {
        const card = document.createElement('div');
        card.className = `diary-card ${colorClassMap[diary.emotion] || ''}`;

        const emotionText = emotionMap[diary.emotion] || diary.emotion;
        const date = new Date(diary.created_at).toLocaleDateString();

        card.innerHTML = `
          <h3>${emotionText}</h3>
          <p>${diary.content}</p>
          <p class="date">${date}</p>
          <button onclick="location.href='diary-detail.html?id=${diary.id}'">상세 보기</button>
        `;

        diaryList.appendChild(card);
      });
    }

    emotionFilter.addEventListener('change', renderDiaries);

    logoutBtn.addEventListener('click', async () => {
      await supabase.auth.signOut();
      location.href = 'login.html';
    });

    fetchDiaries();
  </script>

  <script type="module" src="./js/components/nav.js"></script>
  <nav-bar current="diary"></nav-bar>
</body>
</html>
