<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>일기 상세 보기</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 2rem;
      max-width: 700px;
      margin: auto;
    }

    .back-btn {
      margin-bottom: 1rem;
      font-size: 1rem;
      background: transparent;
      border: none;
      color: #339af0;
      cursor: pointer;
      padding: 0;
    }

    .diary-box {
      background: #f8f9fa;
      padding: 1rem;
      border-radius: 10px;
      margin-bottom: 1.5rem;
    }

    .label { font-weight: bold; }

    .chat-btn {
      padding: 0.7rem 1rem;
      font-size: 1rem;
      background: #22b8cf;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <!-- ✅ 뒤로가기 버튼 추가 -->
  <button class="back-btn" onclick="history.back()">← 뒤로가기</button>

  <h1>📝 일기 상세 보기</h1>

  <div class="diary-box">
    <p><span class="label">작성일:</span> <span id="created-at"></span></p>
    <p><span class="label">감정:</span> <span id="emotion"></span></p>
    <p><span class="label">내용:</span></p>
    <p id="content"></p>
  </div>

  <div id="feedback-box" class="diary-box" style="display:none;"></div>

  <button class="chat-btn" id="chat-btn">💬 이 일기로 AI 상담 시작</button>

  <script type="module">
    import { supabase } from './js/supabase.js';
    import { checkAuth } from './js/auth.js';

    checkAuth();

    const params = new URLSearchParams(location.search);
    const diaryId = params.get('id');
    const feedbackBox = document.getElementById('feedback-box');

    async function loadDiary() {
      if (!diaryId) return alert('일기를 찾을 수 없습니다.');

      const { data, error } = await supabase.from('diaries').select('*').eq('id', diaryId).single();

      if (error || !data) {
        alert('일기 불러오기 실패');
        return;
      }

      document.getElementById('created-at').textContent = new Date(data.created_at).toLocaleString();
      document.getElementById('emotion').textContent = data.emotion;
      document.getElementById('content').textContent = data.content;

      // GPT 피드백/음악 추천 요청
      const res = await fetch('https://emotion-gpt-api.onrender.com/api/feedback', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content: data.content })
      });

      const gpt = await res.json();
      if (gpt.feedback || gpt.music) {
        feedbackBox.style.display = 'block';
        feedbackBox.innerHTML = `
          <p><strong>GPT 피드백:</strong> ${gpt.feedback}</p>
          <p><a href="${gpt.music}" target="_blank">🎵 음악 추천 듣기</a></p>
        `;
      }
    }

    document.getElementById('chat-btn').addEventListener('click', () => {
      location.href = `chat.html?id=${diaryId}`;
    });

    loadDiary();
  </script>
</body>
</html>
