<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI 감정 상담</title>
  <style>
    body {
      font-family: sans-serif;
      background: #f8f9fa;
      padding: 2rem;
      max-width: 600px;
      margin: auto;
      padding-bottom: 80px;
    }

    .back-btn {
      margin-bottom: 1rem;
      font-size: 1rem;
      background: transparent;
      border: none;
      color: #339af0;
      cursor: pointer;
      padding: 0;
    }

    .chat-box {
      background: white;
      border-radius: 10px;
      padding: 1rem;
      height: 400px;
      overflow-y: auto;
      margin-bottom: 1rem;
      border: 1px solid #ccc;
      display: flex;
      flex-direction: column;
    }

    .message {
      margin-bottom: 1rem;
      padding: 0.5rem;
      border-radius: 6px;
      max-width: 90%;
      word-break: break-word;
    }

    .user {
      background: #e3fafc;
      align-self: flex-end;
      text-align: right;
    }

    .gpt {
      background: #f1f3f5;
      align-self: flex-start;
    }

    #typing {
      font-style: italic;
      color: gray;
      margin-bottom: 1rem;
    }

    #input-form {
      display: flex;
      gap: 0.5rem;
    }

    input {
      flex: 1;
      padding: 0.5rem;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    button {
      padding: 0.5rem 1rem;
      background: #339af0;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    /* ✅ 네비게이션 스타일 */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: #ffffff;
      border-top: 1px solid #ccc;
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 0.6rem 0;
      z-index: 1000;
      box-shadow: 0 -2px 5px rgba(0,0,0,0.05);
    }

    .bottom-nav a {
      flex: 1;
      text-align: center;
      text-decoration: none;
      font-size: 1.7rem;
      color: #333;
      transition: color 0.2s ease;
    }

    .bottom-nav a:hover {
      color: #228be6;
    }

    .bottom-nav a.active {
      color: #228be6;
      font-weight: bold;
      border-bottom: 2px solid #228be6;
    }
  </style>
</head>
<body>
  <!-- ✅ 뒤로가기 버튼 -->
  <button class="back-btn" onclick="history.back()">← 뒤로가기</button>

  <h1>🧠 AI 감정 상담</h1>

  <div class="chat-box" id="chat"></div>
  <p id="typing" style="display:none">GPT가 입력 중</p>

  <form id="input-form">
    <input type="text" id="message" placeholder="상담 내용을 입력하세요..." />
    <button type="submit">보내기</button>
  </form>

  <script type="module">
    import { supabase } from './js/supabase.js';
    import { checkAuth } from './js/auth.js';
    import { insertBottomNav } from './js/components/nav.js';

    checkAuth();
    insertBottomNav(); // ✅ 네비게이션 삽입

    const params = new URLSearchParams(location.search);
    const diaryId = params.get('id');
    const chatBox = document.getElementById('chat');
    const input = document.getElementById('message');
    const form = document.getElementById('input-form');
    const typing = document.getElementById('typing');

    const renderUrl = 'https://emotion-gpt-api.onrender.com';
    let conversation = [];
    let typingInterval = null;

    function showTyping() {
      typing.style.display = 'block';
      let dotCount = 0;
      typingInterval = setInterval(() => {
        dotCount = (dotCount + 1) % 4;
        typing.textContent = 'GPT가 입력 중' + '.'.repeat(dotCount);
      }, 500);
    }

    function hideTyping() {
      clearInterval(typingInterval);
      typing.style.display = 'none';
    }

    function addMessage(sender, text) {
      const div = document.createElement('div');
      div.className = `message ${sender}`;
      div.innerText = text;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function addMessageToDB(role, content) {
      const { data: { user } } = await supabase.auth.getUser();
      await supabase.from('chat_history').insert({
        user_id: user.id,
        diary_id: diaryId,
        role,
        content
      });
    }

    async function loadPreviousMessages() {
      const { data: { user } } = await supabase.auth.getUser();

      const { data, error } = await supabase
        .from('chat_history')
        .select('*')
        .eq('user_id', user.id)
        .eq('diary_id', diaryId)
        .order('created_at', { ascending: true });

      if (data) {
        data.forEach((msg) => {
          addMessage(msg.role === 'assistant' ? 'gpt' : 'user', msg.content);
          conversation.push({ role: msg.role, content: msg.content });
        });
      }
    }

    async function startChat() {
      const { data, error } = await supabase.from('diaries').select('*').eq('id', diaryId).single();
      if (error || !data) return alert('일기를 불러올 수 없습니다.');

      const prompt = `사용자의 일기 내용은 다음과 같습니다:\n\n"${data.content}"\n\n이 내용을 바탕으로 부드럽게 상담을 시작해주세요.`;

      addMessage('gpt', '일기 내용을 분석 중입니다...');
      showTyping();

      const res = await fetch(`${renderUrl}/api/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: [{ role: 'user', content: prompt }] })
      });

      const dataJson = await res.json();
      hideTyping();

      if (dataJson.reply) {
        chatBox.lastChild.innerText = dataJson.reply;
        await addMessageToDB('user', prompt);
        await addMessageToDB('assistant', dataJson.reply);
        conversation.push({ role: 'user', content: prompt });
        conversation.push({ role: 'assistant', content: dataJson.reply });
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = input.value.trim();
      if (!msg) return;

      addMessage('user', msg);
      await addMessageToDB('user', msg);
      conversation.push({ role: 'user', content: msg });
      input.value = '';
      showTyping();

      const res = await fetch(`${renderUrl}/api/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: conversation })
      });

      const dataJson = await res.json();
      hideTyping();
      addMessage('gpt', dataJson.reply);
      await addMessageToDB('assistant', dataJson.reply);
      conversation.push({ role: 'assistant', content: dataJson.reply });
    });

    await loadPreviousMessages();
    await startChat();
  </script>
</body>
</html>
