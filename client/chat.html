<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI 감정 상담</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      background: #f8f9fa;
      padding: 2rem 1rem 100px;
      max-width: 600px;
      margin: auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .chat-box {
      background: #ffffff;
      border: 1px solid #dee2e6;
      border-radius: 12px;
      padding: 1rem;
      height: 400px;
      overflow-y: auto;
      margin-bottom: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    .message {
      max-width: 80%;
      padding: 0.7rem 1rem;
      border-radius: 16px;
      word-break: break-word;
      line-height: 1.4;
    }

    .user {
      align-self: flex-end;
      background-color: #228be6;
      color: white;
      border-bottom-right-radius: 0;
    }

    .gpt {
      align-self: flex-start;
      background-color: #f1f3f5;
      border-bottom-left-radius: 0;
    }

    #typing {
      font-style: italic;
      color: gray;
      margin-bottom: 0.5rem;
      text-align: center;
    }

    form {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      max-width: 600px;
      margin: auto;
      background: white;
      padding: 0.8rem;
      display: flex;
      gap: 0.5rem;
      border-top: 1px solid #ccc;
    }

    input {
      flex: 1;
      padding: 0.6rem 1rem;
      border: 1px solid #ccc;
      border-radius: 20px;
      font-size: 1rem;
    }

    button {
      background: #339af0;
      color: white;
      border: none;
      padding: 0 1rem;
      border-radius: 20px;
      font-size: 1rem;
      cursor: pointer;
    }

    button:hover {
      background: #228be6;
    }
  </style>
</head>
<body>
  <h1>💬 AI 감정 상담</h1>

  <div class="chat-box" id="chat"></div>
  <div id="typing" style="display: none">GPT가 입력 중...</div>

  <form id="input-form">
    <input type="text" id="message" placeholder="상담 내용을 입력하세요..." />
    <button type="submit">보내기</button>
  </form>

  <script type="module">
    import { supabase } from './js/supabase.js';
    import { checkAuth } from './js/auth.js';
    import { insertBottomNav } from './js/components/nav.js';

    checkAuth();
    insertBottomNav();

    const params = new URLSearchParams(location.search);
    const diaryId = params.get('id');
    const chatBox = document.getElementById('chat');
    const input = document.getElementById('message');
    const form = document.getElementById('input-form');
    const typing = document.getElementById('typing');

    const renderUrl = 'https://emotion-gpt-api.onrender.com';
    let conversation = [];

    function addMessage(sender, text) {
      const msg = document.createElement('div');
      msg.className = `message ${sender}`;
      msg.innerText = text;
      chatBox.appendChild(msg);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function addToHistory(role, content) {
      const { data: { user } } = await supabase.auth.getUser();
      await supabase.from('chat_history').insert({
        user_id: user.id,
        diary_id: diaryId,
        role,
        content
      });
    }

    async function loadHistory() {
      const { data: { user } } = await supabase.auth.getUser();
      const { data } = await supabase
        .from('chat_history')
        .select('*')
        .eq('user_id', user.id)
        .eq('diary_id', diaryId)
        .order('created_at');

      data.forEach(m => {
        addMessage(m.role === 'assistant' ? 'gpt' : 'user', m.content);
        conversation.push({ role: m.role, content: m.content });
      });
    }

    async function startChatFromDiary() {
      const { data } = await supabase
        .from('diaries')
        .select('*')
        .eq('id', diaryId)
        .single();

      const prompt = `사용자의 일기 내용은 다음과 같습니다:\n\n"${data.content}"\n\n이 내용을 바탕으로 부드럽게 상담을 시작해주세요.`;
      addMessage('gpt', '일기 내용을 분석 중입니다...');
      typing.style.display = 'block';

      const res = await fetch(`${renderUrl}/api/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: [{ role: 'user', content: prompt }] })
      });

      const { reply } = await res.json();
      typing.style.display = 'none';
      chatBox.lastChild.innerText = reply;

      await addToHistory('user', prompt);
      await addToHistory('assistant', reply);
      conversation.push({ role: 'user', content: prompt });
      conversation.push({ role: 'assistant', content: reply });
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = input.value.trim();
      if (!msg) return;

      addMessage('user', msg);
      await addToHistory('user', msg);
      conversation.push({ role: 'user', content: msg });
      input.value = '';
      typing.style.display = 'block';

      const res = await fetch(`${renderUrl}/api/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: conversation })
      });

      const { reply } = await res.json();
      typing.style.display = 'none';
      addMessage('gpt', reply);
      await addToHistory('assistant', reply);
      conversation.push({ role: 'assistant', content: reply });
    });

    await loadHistory();
    if (conversation.length === 0) {
      await startChatFromDiary();
    }
  </script>
</body>
</html>
