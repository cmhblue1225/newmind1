<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>일기 작성</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 2rem;
      padding-bottom: 80px;
      max-width: 600px;
      margin: auto;
    }

    textarea, select, button {
      width: 100%;
      margin-bottom: 1rem;
      padding: 0.5rem;
      font-size: 1rem;
    }

    #gpt-feedback {
      background-color: #f1f3f5;
      padding: 1rem;
      border-radius: 8px;
    }

    button {
      background-color: #228be6;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background-color: #1971c2;
    }

    h2 {
      margin-top: 2rem;
    }

    label[for="share-checkbox"] {
      font-size: 0.95rem;
      display: inline-block;
      margin-bottom: 1rem;
    }

    /* ✅ 네비게이션 바 스타일 */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: #ffffff;
      border-top: 1px solid #ccc;
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 0.6rem 0;
      z-index: 1000;
      box-shadow: 0 -2px 5px rgba(0,0,0,0.05);
    }

    .bottom-nav a {
      flex: 1;
      text-align: center;
      text-decoration: none;
      font-size: 1.7rem;
      color: #333;
      transition: color 0.2s ease;
    }

    .bottom-nav a:hover {
      color: #228be6;
    }

    .bottom-nav a.active {
      color: #228be6;
      font-weight: bold;
      border-bottom: 2px solid #228be6;
    }
  </style>
</head>
<body>
  <h1>오늘의 감정 일기</h1>

  <form id="diary-form">
    <label for="content">일기 내용</label>
    <textarea id="content" rows="8" placeholder="오늘 하루를 자유롭게 적어보세요..."></textarea>

    <!-- 감정 선택 아래 → 위로 이동된 자동 분석 버튼 -->
    <button type="button" id="analyze-btn">✍️ 감정 자동 분석</button>

    <label for="emotion">감정 선택</label>
    <select id="emotion">
      <option value="">-- 감정을 선택하세요 --</option>
      <option value="happy">😊 행복</option>
      <option value="sad">😢 슬픔</option>
      <option value="angry">😠 분노</option>
      <option value="anxious">😟 불안</option>
      <option value="neutral">😐 보통</option>
    </select>

    <button type="button" id="feedback-btn">💬 GPT 피드백 받기</button>

    <label>
      <input type="checkbox" id="share-checkbox" />
      익명으로 일기를 공유하시겠습니까?
    </label>

    <button type="submit">📌 일기 저장</button>
  </form>

  <h2>GPT 분석 결과</h2>
  <div id="gpt-feedback"></div>

  <script type="module">
    import { supabase } from './js/supabase.js';
    import { checkAuth } from './js/auth.js';
    import { insertBottomNav } from './js/components/nav.js';

    checkAuth();
    insertBottomNav();

    const form = document.getElementById('diary-form');
    const emotionSelect = document.getElementById('emotion');
    const contentInput = document.getElementById('content');
    const feedbackBox = document.getElementById('gpt-feedback');
    const renderUrl = 'https://emotion-gpt-api.onrender.com';

    // 감정 자동 분석 버튼
    document.getElementById('analyze-btn').addEventListener('click', async () => {
      const content = contentInput.value.trim();
      if (!content) return alert('일기를 먼저 입력해주세요.');

      const res = await fetch(`${renderUrl}/api/analyze-emotion`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content })
      });

      const data = await res.json();
      if (data.emotion) {
        emotionSelect.value = data.emotion;
        feedbackBox.innerHTML = `<p>GPT 감정 분석 결과: <strong>${data.emotion}</strong></p>`;
      } else {
        feedbackBox.innerHTML = '<p>감정 분석 실패</p>';
      }
    });

    // GPT 피드백 버튼 (감정 선택은 변경하지 않음)
    document.getElementById('feedback-btn').addEventListener('click', async () => {
      const content = contentInput.value.trim();
      if (!content) return alert('일기를 먼저 입력해주세요.');

      const res = await fetch(`${renderUrl}/api/feedback`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content })
      });

      const data = await res.json();

      if (data.feedback || data.music) {
        feedbackBox.innerHTML = `
          <p><strong>GPT 분석 감정:</strong> ${data.emotion}</p>
          <p><strong>피드백:</strong> ${data.feedback}</p>
          <p><a href="${data.music}" target="_blank">🎵 GPT 음악 추천 듣기</a></p>
        `;
      } else {
        feedbackBox.innerHTML = '<p>GPT 피드백을 가져오지 못했습니다.</p>';
      }
    });

    // 일기 저장
    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const content = contentInput.value.trim();
      const emotion = emotionSelect.value;
      const share = document.getElementById('share-checkbox').checked;

      if (!content || !emotion) {
        alert('일기 내용과 감정을 모두 입력해주세요.');
        return;
      }

      const { data: { user } } = await supabase.auth.getUser();

      const { data: diaryData, error: diaryError } = await supabase
        .from('diaries')
        .insert({ user_id: user.id, content, emotion })
        .select()
        .single();

      if (diaryError) {
        alert('일기 저장 실패: ' + diaryError.message);
        return;
      }

      // 공유 처리
      if (share) {
        const feedbackText = feedbackBox.querySelector('p:nth-child(2)')?.innerText?.replace('피드백:', '').trim();
        const musicLink = feedbackBox.querySelector('a')?.href || '';

        const { error: shareError } = await supabase.from('shared_diaries').insert({
          diary_id: diaryData.id,
          user_id: user.id,
          emotion,
          content,
          feedback: feedbackText || '',
          music: musicLink,
        });

        if (shareError) {
          alert('공유 저장 실패: ' + shareError.message);
        }

        // 알림 전송
        const { data: subscribers } = await supabase
          .from('subscriptions')
          .select('follower_id')
          .eq('following_id', user.id);

        const anonId = `anon-${user.id.slice(0, 4)}`;
        const message = `익명 유저 ${anonId}가 새로운 일기를 공유했습니다.`;

        const notifications = subscribers.map(sub => ({
          user_id: sub.follower_id,
          from_user_id: user.id,
          diary_id: diaryData.id,
          message,
        }));

        if (notifications.length > 0) {
          const { error: notifError } = await supabase.from('notifications').insert(notifications);
          if (notifError) {
            console.error('알림 저장 실패:', notifError.message);
          }
        }
      }

      alert('일기가 저장되었습니다!');
      location.href = 'my-diary.html';
    });
  </script>
</body>
</html>
