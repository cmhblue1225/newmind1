<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>감정 통계</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: sans-serif;
      padding: 2rem;
      max-width: 600px;
      margin: auto;
      background: #f8f9fa;
    }

    canvas {
      margin-top: 2rem;
    }

    h1, h2 {
      text-align: center;
    }

    #no-data {
      text-align: center;
      margin-top: 2rem;
      color: gray;
    }

    #gpt-summary {
      background: #fff3bf;
      padding: 1rem;
      border-radius: 10px;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <h1>📊 내 감정 통계</h1>

  <div id="no-data" style="display: none;">일기 데이터가 없습니다.</div>
  <canvas id="emotionChart" style="display: none;" width="400" height="400"></canvas>

  <h2 style="margin-top: 3rem;">📈 최근 감정 추이</h2>
  <canvas id="emotionTrendChart" width="400" height="300"></canvas>

  <h2 style="margin-top: 3rem;">🧠 GPT 감정 분석 요약</h2>
  <div id="gpt-summary"></div>

  <script type="module">
    import { supabase } from './js/supabase.js';
    import { checkAuth } from './js/auth.js';

    checkAuth();

    const chartEl = document.getElementById('emotionChart');
    const trendEl = document.getElementById('emotionTrendChart');
    const noDataEl = document.getElementById('no-data');
    const summaryBox = document.getElementById('gpt-summary');

    const renderUrl = 'https://YOUR_RENDER_URL.onrender.com'; // ← 실제 Render 주소로 변경

    const emotions = ['happy', 'sad', 'angry', 'anxious', 'neutral'];
    const emotionLabels = {
      happy: '😊 행복',
      sad: '😢 슬픔',
      angry: '😠 분노',
      anxious: '😟 불안',
      neutral: '😐 보통'
    };

    async function loadEmotionStats() {
      const { data: { user } } = await supabase.auth.getUser();

      const { data, error } = await supabase
        .from('diaries')
        .select('emotion, created_at')
        .eq('user_id', user.id);

      if (error || !data || data.length === 0) {
        noDataEl.style.display = 'block';
        return;
      }

      // 파이 차트용
      const counts = {};
      emotions.forEach(e => counts[e] = 0);
      data.forEach(entry => {
        if (counts[entry.emotion] !== undefined) {
          counts[entry.emotion]++;
        }
      });

      const chartData = emotions.map(e => counts[e]);
      const chartLabels = emotions.map(e => emotionLabels[e]);

      chartEl.style.display = 'block';
      new Chart(chartEl, {
        type: 'pie',
        data: {
          labels: chartLabels,
          datasets: [{
            data: chartData,
            backgroundColor: ['#74c0fc','#ff8787','#ffa94d','#ffd43b','#ced4da'],
            borderColor: '#fff',
            borderWidth: 2
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { position: 'bottom' },
            title: { display: true, text: '감정별 기록 비율' }
          }
        }
      });

      // 꺾은선 차트용
      const emotionScores = { happy: 2, neutral: 1, anxious: 0, sad: -1, angry: -2 };
      const dateEmotionMap = {};

      data.forEach(entry => {
        const dateStr = new Date(entry.created_at).toISOString().split('T')[0];
        if (!dateEmotionMap[dateStr]) dateEmotionMap[dateStr] = [];
        if (emotionScores[entry.emotion] !== undefined) {
          dateEmotionMap[dateStr].push(emotionScores[entry.emotion]);
        }
      });

      const sortedDates = Object.keys(dateEmotionMap).sort();
      const trendLabels = [];
      const trendData = [];

      sortedDates.forEach(date => {
        const scores = dateEmotionMap[date];
        const avg = scores.reduce((a, b) => a + b, 0) / scores.length;
        trendLabels.push(date);
        trendData.push(avg.toFixed(2));
      });

      if (trendData.length > 0) {
        new Chart(trendEl, {
          type: 'line',
          data: {
            labels: trendLabels,
            datasets: [{
              label: '감정 점수 (2~ -2)',
              data: trendData,
              fill: false,
              borderColor: '#4dabf7',
              tension: 0.2
            }]
          },
          options: {
            responsive: true,
            scales: {
              y: {
                title: { display: true, text: '감정 점수' },
                suggestedMin: -2,
                suggestedMax: 2
              }
            }
          }
        });

        await getGPTSummary(trendData, trendLabels);
      }
    }

    // GPT 감정 피드백 요청
    async function getGPTSummary(trendData, trendLabels) {
      const recentData = trendLabels.map((date, i) => ({
        date,
        score: trendData[i]
      }));

      const res = await fetch(`${renderUrl}/api/emotion-summary`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ emotions: recentData })
      });

      const data = await res.json();
      summaryBox.innerText = data.summary || 'GPT 분석 실패';
    }

    loadEmotionStats();
  </script>
</body>
</html>
