<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>감정 통계</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: 'Pretendard', sans-serif;
      padding: 2rem;
      padding-bottom: 80px;
      max-width: 800px;
      margin: auto;
      background: #f8f9fa;
    }

    h1, h2 {
      text-align: center;
      margin-top: 2rem;
    }

    .card {
      background: white;
      padding: 1.2rem;
      border-radius: 12px;
      margin: 1.5rem 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    #no-data {
      text-align: center;
      margin-top: 3rem;
      font-size: 1.1rem;
      color: #868e96;
    }

    canvas {
      display: block;
      margin: auto;
      max-width: 100%;
      height: auto;
    }

    #gpt-summary {
      background: #fff3bf;
      padding: 1rem;
      border-radius: 10px;
      font-size: 1rem;
      line-height: 1.5;
      box-shadow: inset 0 0 6px rgba(0,0,0,0.05);
    }
  </style>
</head>
<body>
  <h1>📊 내 감정 통계</h1>

  <div class="card" id="chart-section" style="display: none;">
    <canvas id="emotionChart"></canvas>
  </div>

  <div class="card">
    <h2>📈 날짜별 감정 흐름</h2>
    <canvas id="emotionTrendChart"></canvas>
  </div>

  <div class="card">
    <h2>📅 요일별 감정 추이</h2>
    <canvas id="weeklyEmotionChart"></canvas>
  </div>

  <div class="card">
    <h2>🧠 GPT 감정 주간 분석</h2>
    <div id="gpt-summary">요약 불러오는 중...</div>
  </div>

  <div id="no-data" style="display: none;">일기 데이터가 부족합니다. 😢</div>

  <script type="module">
    import { supabase } from './js/supabase.js';
    import { checkAuth } from './js/auth.js';
    import { insertBottomNav } from './js/components/nav.js';

    checkAuth();
    insertBottomNav();

    const emotionScores = {
      happy: 2,
      neutral: 1,
      anxious: 0,
      sad: -1,
      angry: -2
    };

    const weekDays = ['월', '화', '수', '목', '금', '토', '일'];

    async function loadStats() {
      const { data: { user } } = await supabase.auth.getUser();

      const { data, error } = await supabase
        .from('diaries')
        .select('emotion, created_at')
        .eq('user_id', user.id);

      if (error || !data || data.length === 0) {
        document.getElementById('no-data').style.display = 'block';
        return;
      }

      const emotionCounts = { happy: 0, sad: 0, angry: 0, anxious: 0, neutral: 0 };
      const dateMap = {};
      const weekMap = { 월: [], 화: [], 수: [], 목: [], 금: [], 토: [], 일: [] };

      data.forEach(entry => {
        if (emotionCounts[entry.emotion] !== undefined) {
          emotionCounts[entry.emotion]++;
        }

        const date = new Date(entry.created_at);
        const dateStr = date.toISOString().split('T')[0];
        const weekday = weekDays[date.getDay() === 0 ? 6 : date.getDay() - 1];

        const score = emotionScores[entry.emotion];
        if (score !== undefined) {
          if (!dateMap[dateStr]) dateMap[dateStr] = [];
          dateMap[dateStr].push(score);
          weekMap[weekday].push(score);
        }
      });

      const chartLabels = Object.keys(emotionCounts).map(e => {
        return { happy: '😊 행복', sad: '😢 슬픔', angry: '😠 분노', anxious: '😟 불안', neutral: '😐 보통' }[e];
      });

      const chartData = Object.values(emotionCounts);

      if (chartData.reduce((a, b) => a + b, 0) > 0) {
        document.getElementById('chart-section').style.display = 'block';
        new Chart(document.getElementById('emotionChart'), {
          type: 'pie',
          data: {
            labels: chartLabels,
            datasets: [{
              data: chartData,
              backgroundColor: ['#74c0fc','#ff8787','#ffa94d','#ffd43b','#ced4da'],
              borderWidth: 2
            }]
          },
          options: {
            plugins: {
              legend: { position: 'bottom' },
              title: { display: true, text: '감정 비율' }
            }
          }
        });
      }

      const sortedDates = Object.keys(dateMap).sort();
      const dateLabels = [], dateData = [];
      sortedDates.forEach(date => {
        const avg = dateMap[date].reduce((a, b) => a + b, 0) / dateMap[date].length;
        dateLabels.push(date);
        dateData.push(avg.toFixed(2));
      });

      new Chart(document.getElementById('emotionTrendChart'), {
        type: 'line',
        data: {
          labels: dateLabels,
          datasets: [{
            label: '날짜별 감정 점수 (2~ -2)',
            data: dateData,
            borderColor: '#4dabf7',
            tension: 0.3
          }]
        },
        options: {
          scales: {
            y: { suggestedMin: -2, suggestedMax: 2 }
          }
        }
      });

      const weekData = weekDays.map(day => {
        const scores = weekMap[day];
        return scores.length ? (scores.reduce((a, b) => a + b, 0) / scores.length).toFixed(2) : null;
      });

      new Chart(document.getElementById('weeklyEmotionChart'), {
        type: 'line',
        data: {
          labels: weekDays,
          datasets: [{
            label: '요일별 감정 점수',
            data: weekData,
            borderColor: '#20c997',
            tension: 0.3
          }]
        },
        options: {
          scales: {
            y: { suggestedMin: -2, suggestedMax: 2 }
          }
        }
      });

      await requestWeeklySummary(weekDays, weekData);
    }

    async function requestWeeklySummary(labels, data) {
      const res = await fetch('https://emotion-gpt-api.onrender.com/api/emotion-summary', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          emotions: labels.map((day, i) => ({ date: day, score: data[i] }))
        })
      });

      const result = await res.json();
      document.getElementById('gpt-summary').innerText = result.summary || 'GPT 분석 결과를 불러올 수 없습니다.';
    }

    loadStats();
  </script>
</body>
</html>
